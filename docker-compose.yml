services:
  gojira-mcp:
    image: gojira-mcp:latest
    build:
      context: .
    restart: unless-stopped
    ports:
      # Bind to loopback only. This is the plain-HTTP OAuth/MCP listener; expose
      # it publicly through the Caddy TLS overlay, not directly. (The Caddy
      # overlay resets this and reaches the app over the internal network.)
      - "127.0.0.1:8081:8081"
    environment:
      MCP_PORT: 8081
      MCP_SERVER_URL: "${MCP_SERVER_URL:-https://gojira.example.com}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
    env_file:
      # Parameterized so multiple instances can run from one checkout:
      # each deploy profile sets GOJIRA_ENV_FILE to itself (see deploy/*.env.example)
      # and `docker compose --env-file <profile>` makes it visible here.
      - ${GOJIRA_ENV_FILE:-.env}
    depends_on:
      redis:
        condition: service_healthy
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD}"
      - "--maxmemory"
      - "512mb"
      # noeviction, NOT allkeys-lru: this store holds encrypted credentials, API
      # token bindings, and the operation journal. Under memory pressure, fail
      # writes loudly rather than silently evicting tokens/audit trail. Size
      # --maxmemory to the workload; alert on used_memory.
      - "--maxmemory-policy"
      - "noeviction"
      - "--appendonly"
      - "yes"
    environment:
      # Make the password available inside the container for the healthcheck.
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    expose: ["6379"]
    healthcheck:
      # CMD-SHELL so $REDIS_PASSWORD expands; exec-form CMD passes it literally
      # and the AUTH'd PING then fails, wedging depends_on: service_healthy.
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  redis-data:

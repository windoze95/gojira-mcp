services:
  gojira-mcp:
    image: gojira-mcp:latest
    build:
      context: .
    container_name: gojira-mcp
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      MCP_PORT: 8081
      MCP_SERVER_URL: "${MCP_SERVER_URL:-https://gojira.example.com}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks: [internal]

  redis:
    image: redis:7-alpine
    container_name: gojira-redis
    restart: unless-stopped
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD}"
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--appendonly"
      - "yes"
    expose: ["6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  redis-data:
